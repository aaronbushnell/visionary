<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>

    <!-- Background: very dark purple-black, lighter toward center -->
    <radialGradient id="bg" cx="512" cy="420" r="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#161228"/>
      <stop offset="100%" stop-color="#06040A"/>
    </radialGradient>

    <!-- Ambient violet bloom behind iris (no filter, just a gradient circle) -->
    <radialGradient id="bloom" cx="512" cy="512" r="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7B6EF5" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#7B6EF5" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7B6EF5" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft shadow beneath iris (faked with gradient ellipse) -->
    <radialGradient id="shadow" cx="520" cy="548" r="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2E1C90" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2E1C90" stop-opacity="0"/>
    </radialGradient>

    <!-- Iris: violet gem, lit from top-left -->
    <radialGradient id="iris" cx="450" cy="428" r="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E2DAFF"/>
      <stop offset="16%"  stop-color="#BDB0FF"/>
      <stop offset="34%"  stop-color="#9180F7"/>
      <stop offset="58%"  stop-color="#5846CC"/>
      <stop offset="80%"  stop-color="#2E1E88"/>
      <stop offset="100%" stop-color="#110A3C"/>
    </radialGradient>

    <!-- Pupil: very dark center -->
    <radialGradient id="pupil" cx="500" cy="500" r="138" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E1445"/>
      <stop offset="60%"  stop-color="#0C0822"/>
      <stop offset="100%" stop-color="#030210"/>
    </radialGradient>

    <!-- Glass sheen: large upper-left sweep (the key premium effect) -->
    <linearGradient id="sheen" x1="248" y1="218" x2="632" y2="565" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.65"/>
      <stop offset="22%"  stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip everything to the iris boundary -->
    <clipPath id="iris-clip">
      <circle cx="512" cy="512" r="308"/>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient violet bloom -->
  <circle cx="512" cy="512" r="460" fill="url(#bloom)"/>

  <!-- ── DEPTH SHADOW ── -->
  <!-- Soft ellipse shadow gives the iris a floating, elevated feel -->
  <ellipse cx="520" cy="555" rx="300" ry="220" fill="url(#shadow)"/>

  <!-- ── IRIS ── -->
  <circle cx="512" cy="512" r="308" fill="url(#iris)"/>

  <!-- Subtle concentric texture rings (like a real iris) -->
  <circle cx="512" cy="512" r="278" fill="none" stroke="white" stroke-width="0.9" stroke-opacity="0.04"  clip-path="url(#iris-clip)"/>
  <circle cx="512" cy="512" r="245" fill="none" stroke="white" stroke-width="0.9" stroke-opacity="0.055" clip-path="url(#iris-clip)"/>
  <circle cx="512" cy="512" r="210" fill="none" stroke="white" stroke-width="0.9" stroke-opacity="0.068" clip-path="url(#iris-clip)"/>
  <circle cx="512" cy="512" r="173" fill="none" stroke="white" stroke-width="0.9" stroke-opacity="0.078" clip-path="url(#iris-clip)"/>

  <!-- ── PUPIL ── -->
  <!-- Limbal ring (dark band separating iris from pupil) -->
  <circle cx="512" cy="512" r="142" fill="none" stroke="#080420" stroke-width="14" stroke-opacity="0.80" clip-path="url(#iris-clip)"/>
  <!-- Pupil fill -->
  <circle cx="512" cy="512" r="132" fill="url(#pupil)" clip-path="url(#iris-clip)"/>

  <!-- ── GLASS SHEEN ── -->
  <!-- 1. Large diffuse sweep covering upper-left hemisphere -->
  <ellipse cx="405" cy="375" rx="248" ry="164"
    fill="url(#sheen)"
    transform="rotate(-22 405 375)"
    clip-path="url(#iris-clip)"/>

  <!-- 2. Medium soft highlight (tighter ellipse) -->
  <ellipse cx="382" cy="352" rx="96" ry="62"
    fill="white" opacity="0.24"
    transform="rotate(-15 382 352)"
    clip-path="url(#iris-clip)"/>

  <!-- 3. Hard specular ellipse -->
  <ellipse cx="364" cy="336" rx="44" ry="30"
    fill="white" opacity="0.60"
    transform="rotate(-10 364 336)"
    clip-path="url(#iris-clip)"/>

  <!-- 4. Bright pin-point specular -->
  <circle cx="355" cy="328" r="17" fill="white" opacity="0.88" clip-path="url(#iris-clip)"/>
  <circle cx="355" cy="328" r="6"  fill="white" opacity="1.0"  clip-path="url(#iris-clip)"/>

  <!-- 5. Dim secondary catchlight (lower-right, second light source) -->
  <circle cx="652" cy="665" r="26" fill="white" opacity="0.055" clip-path="url(#iris-clip)"/>

  <!-- ── EDGE DEFINITION ── -->
  <!-- Thin bright outer ring -->
  <circle cx="512" cy="512" r="308" fill="none" stroke="white"   stroke-width="1.5" stroke-opacity="0.10"/>
  <!-- Dark bevel just inside -->
  <circle cx="512" cy="512" r="305" fill="none" stroke="#000000" stroke-width="5"   stroke-opacity="0.20"/>

</svg>
